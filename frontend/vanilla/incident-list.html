
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Incident List</title>
        <link rel="stylesheet" href="incidents.css">
    </head>
    <body>
        <h1 id="title">Incidents</h1>
        <form id="add-incident-form">
            <legend>Create Incident</legend>
            <label>
                Title
                <input id="incident-title" type="text" required>
            </label>
            <label>
                Service
                <input id="incident-service" type="text" required>
            </label>
            <label>
                Severity
                <input id="incident-severity" type="text" required>
            </label>
            <div id="error-message" style="display: none; color: red;"></div>
            <button type="submit">Create Incident</button>
        </form>
        <ul id="incident-list">
        </ul>
        <button id="logout" onclick="logout()">logout</button>
    </body>
    <script>
        var incidents = []
        const ul = document.querySelector("#incident-list")
        
        async function loadIncidents() {
            const res = await fetch("/api/incidents", {
                credentials: "include"
            })
            if (!res.ok) {
                alert(res.error)
            }
            incidents = await res.json()
        }

        function render() {
            ul.innerHTML = ""
            incidents.forEach(inc => {
                const date = new Date(inc.created_at);
                const formatted = date.toISOString().slice(5, 16).replace('T', ' ');
                const li = document.createElement("li")
                li.innerHTML = `<span class=${inc.severity}>${inc.severity}</span>
                <h3>${inc.title}</h3>
                <p>${formatted}</p>
                <p>Status: ${inc.status}</p>`
                ul.appendChild(li)
            })
        }
        
        async function logout() {
            await fetch("/api/auth/logout", {
                method: "POST",
                credentials: "include"
            })
            window.location.href = "/login.html"
        }
        async function createIncident(title, service, severity) {
            const errorDiv = document.getElementById("error-message");
            try {
                res = await fetch("/api/incidents", {
                    method: "POST",
                    credentials: "include",
                    body: JSON.stringify({ title, service, severity }),
                })
                const data = await res.json();
                if (!res.ok) {
                    const errorCode = data.error.code;
                    const message = data.error.message;
                    throw new Error(`${errorCode}: ${message}`);
                }
                await refreshIncidents()
            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.style.display = "block";
            }
        }


        const form = document.getElementById("add-incident-form");
        form.addEventListener("submit", (event) => {
            event.preventDefault();
            const title = document.getElementById("incident-title").value;
            const service = document.getElementById("incident-service").value;
            const severity = document.getElementById("incident-severity").value;
            createIncident(title, service, severity)
        })

        async function refreshIncidents() {
            await loadIncidents()
            await render()
        }

        refreshIncidents()
    </script>
</html>
