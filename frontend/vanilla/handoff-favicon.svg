<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- carbon tile -->
  <rect x="0" y="0" width="32" height="32" fill="#101317"/>
  <rect x="0.75" y="0.75" width="30.5" height="30.5" fill="none" stroke="#272d37" stroke-width="1.5"/>

  <!-- hazard top edge -->
  <g>
    <rect x="0" y="0" width="32" height="2.6" fill="#101317"/>
    <rect x="0"  y="0" width="4" height="2.6" fill="#f5c518"/>
    <rect x="8"  y="0" width="4" height="2.6" fill="#f5c518"/>
    <rect x="16" y="0" width="4" height="2.6" fill="#f5c518"/>
    <rect x="24" y="0" width="4" height="2.6" fill="#f5c518"/>
  </g>

  <!-- the // brandmark -->
  <g stroke="#ff8a1e" stroke-width="3.4" stroke-linecap="square">
    <line x1="10" y1="24" x2="16" y2="9"/>
    <line x1="17" y1="24" x2="23" y2="9"/>
  </g>

  <!-- tactical corner brackets -->
  <g stroke="#ff8a1e" stroke-width="1.6" fill="none">
    <path d="M5 9 V5 H9"/>
    <path d="M27 23 V27 H23"/>
  </g>
</svg>
