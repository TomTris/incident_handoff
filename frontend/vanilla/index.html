<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Incident Handoff</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <script>
        async function checkAuth() {
            try {
                const res = await fetch("/api/auth/me", {
                    credentials: "include"
                });
                
                console.log(await res.json())
            } catch {
                alert("Unexpected Error");
            }
        }
        checkAuth()
    </script>
</body>
</html>
