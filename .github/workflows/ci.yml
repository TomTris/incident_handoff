# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go
# https://github.com/actions/starter-workflows/tree/main/ci

name: Go

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-26.04
    
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
  
    steps:
    - uses: actions/checkout@v7

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version-file: 'backend-go/go.mod'

    - name: Build
      run: pwd && cd backend-go && go build -v ./...

    - name: Test
      run: cd backend-go && go test -v ./...
      env:
        HANDOFF_JWT_SECRET: test-test-test-test-JWTJWTJWTJWTadwbfqifq
        HANDOFF_CONNECT_STRING: mongodb://127.0.0.1:27017/?directConnection=true

  docker:
    runs-on: ubuntu-26.04
    needs: build
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v7
      
      - name: Log in to ghcr
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: build and push docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/incident-handoff:latest

        
